<nav class="navbar">
  <div class="navbar-content">
    
    <div class="navbar-left">
      <img src="https://avatars.mds.yandex.net/i?id=c6f7aaa24055d03a715b9153f303ee4fc9987352-10964795-images-thumbs&n=13.png" alt="Logo" class="nav-logo" (click)="router.navigate(['/'])" style="cursor: pointer;">
      
      <div class="location-selector" (click)="toggleDropdown()">
        <span>📍</span>
        <span class="city-name">{{ selectedCity }}</span>
        <span class="arrow" [class.open]="isDropdownOpen">▼</span>
        
        <div class="dropdown" *ngIf="isDropdownOpen">
          <div class="dropdown-item" *ngFor="let city of cities" (click)="selectCity(city); $event.stopPropagation()">
            {{ city }}
          </div>
        </div>
      </div>
    </div>

    <div class="navbar-center">
      <div class="search-bar-container">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input 
            type="text" 
            [formControl]="searchControl"
            [placeholder]="translation.translate('search_placeholder')" 
            class="search-input"
            (keyup.enter)="onSearchSubmit()"
          >
        </div>
        
        <div class="search-suggestions" *ngIf="suggestions.length > 0">
          <div 
            class="suggestion-item" 
            *ngFor="let item of suggestions" 
            (click)="onSearchSubmit(item)"
          >
            {{ item }}
          </div>
        </div>
      </div>
    </div>

    <div class="navbar-right">
      <div class="cart-control" (click)="router.navigate(['/cart'])" style="cursor: pointer; display: flex; align-items: center; margin-right: 20px;">
        <span style="font-size: 20px; margin-right: 5px;">🛒</span>
        <span style="font-weight: 500; color: #333;">{{ translation.translate('cart') || 'Cart' }}</span>
        
        </div>
      <div class="lang-selector">
        <span class="lang-icon">🌐</span>
        <select class="lang-select" (change)="onLangChange($event)" [value]="translation.currentLangValue">
          <option value="ru">RU</option>
          <option value="kz">KZ</option>
          <option value="en">EN</option>
        </select>
      </div>

      <div class="user-controls" *ngIf="isLoggedIn">
        <span class="user-name" style="margin-right: 10px;">{{ userName }}</span>
        <button class="logout-btn" (click)="logout()">
          <span>{{ translation.translate('sign_out') }}</span>
        </button>
      </div>

      <div class="user-controls" *ngIf="!isLoggedIn">
        <button class="login-btn" (click)="router.navigate(['/login'])">
          <span>{{ translation.translate('sign_in') || 'Sign In' }}</span>
        </button>
      </div>

    </div>
  </div>
</nav>
