<div class="menu-page-wrapper" *ngIf="restaurant">
  <div class="container">
    
    <header class="restaurant-header">
      <div class="header-content">
        <div class="rest-logo-mini">
          <img [src]="restaurant.imageUrl" [alt]="restaurant.name">
        </div>
        <div class="info-card">
          <h1 class="rest-name">{{ restaurant.name }}</h1>
          <p class="rest-desc">{{ restaurant.description }}</p>
          <div class="stats-row">
            <span class="rating">⭐ {{ restaurant.rating }}</span>
            <span class="delivery-time">35–40 мин</span>
            <span class="info-icon">ⓘ</span>
          </div>
        </div>
      </div>
    </header>

    <main class="menu-content">
      <h2 class="section-title">Все блюда</h2>
      <div class="food-grid">
        <div class="food-card" *ngFor="let food of foods; trackBy: trackByFoodId">
          <div class="image-box">
            <img *ngIf="food.imageUrl" [src]="food.imageUrl" [alt]="food.name" class="food-img">
            <div *ngIf="!food.imageUrl" class="placeholder">🍔</div>
            <button class="add-btn-circle" (click)="addToCart(food)">+</button>
          </div>
          <div class="food-info">
            <div class="price">{{ food.price }} ₸</div>
            <div class="name">{{ food.name }}</div>
            <div class="weight">{{ food.weight }}</div>
            
            <div class="actions">
              <button class="add-to-cart" *ngIf="!cartCounts[food.id]" (click)="addToCart(food)">
                Добавить
              </button>
              <div class="counter" *ngIf="cartCounts[food.id] > 0">
                <button (click)="removeFromCart(food)">−</button>
                <span>{{ cartCounts[food.id] }}</span>
                <button (click)="addToCart(food)">+</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

  </div>
</div>
