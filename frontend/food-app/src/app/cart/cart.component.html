<div class="cart-wrapper" style="padding: 20px;">
  <h2>🛒 My Cart</h2>

  <div *ngIf="cartItems.length > 0; else emptyCart">
    
    <div class="cart-table">
      <div *ngFor="let item of cartItems" class="cart-item" 
           style="display: flex; align-items: center; border-bottom: 1px solid #ccc; padding: 10px 0;">
        
        <img *ngIf="item.image" [src]="'http://127.0.0.1:8000' + item.image" 
             style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px;">
        
        <div class="item-details" style="flex-grow: 1;">
          <h3 style="margin: 0;">{{ item.food_name }}</h3>
          <p style="color: #666; margin: 5px 0;">
            {{ item.price }} ₸ × {{ item.quantity }}
          </p>
          <b style="font-size: 1.1em;">{{ item.item_total }} ₸</b>
        </div>

        <button (click)="removeItem(item.id)" 
                style="background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
          Remove
        </button>
      </div>
    </div>

    <div class="cart-footer" style="margin-top: 20px; text-align: right;">
      <h2 style="color: #333;">Total Price: {{ totalPrice }} ₸</h2>
      <button (click)="checkout()" 
              style="background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 8px; cursor: pointer;">
        Place Order
      </button>
    </div>

  </div>

  <ng-template #emptyCart>
    <div style="text-align: center; padding: 50px;">
      <p style="font-size: 1.5em; color: #888;">Your cart is empty 🍽️</p>
      <button routerLink="/menu" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px;">
        Back to Menu
      </button>
    </div>
  </ng-template>
</div>
