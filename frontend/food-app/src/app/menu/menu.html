<div class="container" style="padding: 20px; margin-top: 80px; max-width: 1200px; margin-left: auto; margin-right: auto;">
  
  <div *ngIf="menuItems.length === 0" style="text-align: center; color: #888; padding: 40px;">
    <h3>Загрузка меню или блюда не найдены...</h3>
    <p>ID текущего ресторана: {{ restaurantId }}</p>
  </div>

  <div *ngIf="cartService.items.length > 0" style="background: #eef9f1; border: 1px solid #27ae60; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
    <span>🛍 В корзине товаров: <b>{{ cartService.items.length }}</b></span>
    <span>Итого: <b>{{ cartService.getTotalPrice() }} ₸</b></span>
  </div>

  <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
    <div *ngFor="let item of menuItems" style="border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: white; transition: 0.3s;">
      
      <img [src]="item.image ? (item.image.startsWith('http') ? item.image : 'http://127.0.0.1:8000' + item.image) : 'https://placehold.co/400x300?text=No+Image'" 
           style="width: 100%; height: 150px; object-fit: cover; border-radius: 5px;"
           alt="{{ item.name }}">

      <h3 style="margin: 15px 0 10px;">{{ item.name }}</h3>
      
      <p style="color: #666; font-size: 0.9em; min-height: 40px; margin-bottom: 15px;">
        {{ item.description || 'Описание скоро появится...' }}
      </p>

      <div style="display: flex; justify-content: space-between; align-items: center;">
        <b style="color: #2c3e50; font-size: 1.2em;">{{ item.price }} ₸</b>
        <button (click)="addToCart(item)" 
                style="background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold;">
          Заказать
        </button>
      </div>
    </div>
  </div>
</div>
