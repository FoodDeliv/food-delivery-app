<div class="auth-wrapper">
  <div class="auth-card">
    <img src="https://avatars.mds.yandex.net/i?id=c6f7aaa24055d03a715b9153f303ee4fc9987352-10964795-images-thumbs&n=13.png" alt="Food App Logo" class="logo">
    
    <div *ngIf="message" [ngClass]="messageType === 'success' ? 'msg-success' : 'msg-error'" class="alert-box">
      {{ message }}
    </div>

    <h1>{{ isLoginMode ? 'Sign In' : 'Sign Up' }}</h1>
    <p class="subtitle">Favorite food from restaurants in the city</p>

    <div class="form">
      <div class="input-group" *ngIf="!isLoginMode">
        <label>Email</label>
        <input [(ngModel)]="credentials.email" name="email" type="email" placeholder="example@mail.com">
      </div>

      <div class="input-group">
        <label>Username</label>
        <input [(ngModel)]="credentials.username" name="username" type="text" placeholder="Your name">
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input 
            [(ngModel)]="credentials.password" 
            name="password" 
            [type]="showPassword ? 'text' : 'password'" 
            placeholder="••••••••">
          <span class="toggle-eye" (click)="togglePasswordVisibility()">
            {{ showPassword ? '🙈' : '👁️' }}
          </span>
        </div>
      </div>

      <button class="main-btn" (click)="onSubmit()">
        {{ isLoginMode ? 'Sign In' : 'Sign Up' }}
      </button>

      <p class="forgot-password" *ngIf="isLoginMode" (click)="onForgotPassword()">
        Forgot password?
      </p>

      <p class="toggle-text">
        {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
        <span (click)="toggleMode()">{{ isLoginMode ? 'Sign Up' : 'Sign In' }}</span>
      </p>
    </div>
  </div>
</div>
