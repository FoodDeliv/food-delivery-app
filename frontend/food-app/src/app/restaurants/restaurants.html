<div class="container" style="padding: 20px; font-family: sans-serif;">
  <h1>Список ресторанов</h1>

  <div *ngIf="restaurants.length > 0; else loading">
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
      
      <div *ngFor="let r of restaurants" 
           style="border: 1px solid #ddd; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white;">
        <h2 style="margin: 0 0 10px 0; color: #2c3e50;">{{ r.name }}</h2>
        <p style="color: #7f8c8d; font-size: 0.9em;">{{ r.description }}</p>
        <p style="font-weight: bold; color: #f1c40f;">⭐ {{ r.rating }}</p>
        
        <button (click)="openMenu(r.id)" 
                style="width: 100%; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s;">
          View Menu
        </button>
      </div>

    </div>
  </div>

  <ng-template #loading>
    <div style="text-align: center; margin-top: 50px;">
      <p style="font-size: 1.2em; color: #95a5a6;">Загрузка вкусных мест...</p>
    </div>
  </ng-template>
</div>
