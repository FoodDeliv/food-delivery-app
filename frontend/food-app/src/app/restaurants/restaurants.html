<div class="main-container">
  
  <header class="hero-section">
    <h1>Привет, Бека! 👋</h1>
    <p>Что закажем сегодня?</p>
  </header>

  <section class="food-showcase">
    <div class="section-header">
      <h2>Популярное сейчас</h2>
      <button class="view-all">Все блюда</button>
    </div>
    
    <div class="food-scroll">
      <div class="food-card-modern" *ngFor="let food of allFoods">
        <div class="food-image-wrapper">
          <img [src]="food.image || 'assets/default-food.png'" alt="food">
          <span class="price-tag">{{ food.price }} ₸</span>
        </div>
        <div class="food-details">
          <h3>{{ food.name }}</h3>
          <button class="add-btn" (click)="addToCart(food)">
            <span>+</span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <section class="restaurants-list">
    <div class="section-header">
      <h2>Рестораны рядом</h2>
    </div>

    <div class="restaurants-grid" *ngIf="restaurants.length > 0; else loading">
      <div class="res-card" *ngFor="let r of restaurants" (click)="openMenu(r.id)">
        <div class="res-banner">
          <img [src]="r.image" alt="restaurant">
          <div class="res-rating">⭐ {{ r.rating }}</div>
        </div>
        <div class="res-info">
          <h3>{{ r.name }}</h3>
          <p>{{ r.description }}</p>
          <div class="res-meta">
            <span class="delivery-time">30-45 мин</span>
            <span class="delivery-fee">• Бесплатная доставка</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <ng-template #loading>
    <div class="loader">Ищем лучшие места...</div>
  </ng-template>
</div>
